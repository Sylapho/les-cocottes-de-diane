name: Deploy Staging

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - develop
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 45

    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop') }}

    environment:
      name: staging
      url: https://dev.lescocottesdediane.fr

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy staging
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'set -e
             cd /opt/les-cocottes-de-diane/staging
             docker compose -p cocottes-staging -f docker-compose-staging.yml pull
             docker compose -p cocottes-staging -f docker-compose-staging.yml up -d --remove-orphans
             docker image prune -f'