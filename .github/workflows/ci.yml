name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22
  PNPM_VERSION: 10.33.0
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint workspace
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck workspace
        run: pnpm typecheck

  unit-api:
    name: API unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run API unit tests with coverage
        run: pnpm --filter @localco/api test:cov --runInBand

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-coverage
          path: apps/api/coverage/
          if-no-files-found: error
          retention-days: 14

  unit-web:
    name: Web unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Web unit tests
        run: pnpm test:web

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build API
        run: pnpm build:api

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_build
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      API_INTERNAL_URL: http://localhost:4000/api
      NEXT_PUBLIC_AUTH_URL: http://localhost:4000
      BETTER_AUTH_SECRET: localco-ci-better-auth-secret-placeholder
      BETTER_AUTH_URL: http://localhost:4000

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build Web
        run: pnpm build:web

  build-shop:
    name: Build Shop
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4010/api
      API_INTERNAL_URL: http://127.0.0.1:4010/api

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build Shop
        run: pnpm build:shop

  api-e2e:
    name: API PostgreSQL E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: localco
          POSTGRES_PASSWORD: localco_dev
          POSTGRES_DB: localco_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localco -d localco_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_e2e
      BETTER_AUTH_SECRET: localco-ci-better-auth-secret-placeholder
      BETTER_AUTH_URL: http://localhost:4000
      SHOP_PUBLIC_URL: http://localhost:3001
      STRIPE_SECRET_KEY: localco-ci-stripe-placeholder
      STRIPE_WEBHOOK_SECRET: localco-ci-stripe-webhook-placeholder
      CHECKOUT_RATE_LIMIT_MAX: 1000
      ABANDONED_ORDER_DELAY_MINUTES: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Run API E2E tests
        run: pnpm test:api:e2e --runInBand

  shop-e2e:
    name: Shop Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4010/api
      API_INTERNAL_URL: http://127.0.0.1:4010/api

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Disable unavailable Microsoft apt sources
        run: |
          sudo find /etc/apt/sources.list.d -name '*.list' -type f -print0 \
            | sudo xargs -0 --no-run-if-empty sed -i 's|^deb .*packages.microsoft.com|# disabled: &|'

      - name: Install Playwright browsers
        run: pnpm --filter @localco/shop exec playwright install --with-deps chromium

      - name: Build Shop for Playwright
        run: pnpm build:shop

      - name: Run Shop E2E tests
        run: pnpm test:shop:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-playwright-report
          path: apps/shop/playwright-report/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-playwright-results
          path: apps/shop/test-results/
          if-no-files-found: warn
          retention-days: 14

  shop-fullstack-smoke:
    name: Shop full-stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: localco
          POSTGRES_PASSWORD: localco_dev
          POSTGRES_DB: localco_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localco -d localco_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_smoke
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api
      API_INTERNAL_URL: http://127.0.0.1:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Disable unavailable Microsoft apt sources
        run: |
          sudo find /etc/apt/sources.list.d -name '*.list' -type f -print0 \
            | sudo xargs -0 --no-run-if-empty sed -i 's|^deb .*packages.microsoft.com|# disabled: &|'

      - name: Install Playwright browsers
        run: pnpm --filter @localco/shop exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Seed smoke database
        run: pnpm db:seed

      - name: Build API
        run: pnpm build:api

      - name: Build Shop
        run: pnpm build:shop

      - name: Run full-stack smoke test
        run: pnpm test:shop:smoke

      - name: Upload full-stack smoke results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-fullstack-smoke-results
          path: apps/shop/test-results/fullstack-smoke/
          if-no-files-found: warn
          retention-days: 14

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  docker-build:
    name: Docker production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - lint
      - typecheck
      - unit-api
      - unit-web
      - build-api
      - build-web
      - build-shop
      - api-e2e
      - shop-e2e
      - shop-fullstack-smoke
      - dependency-audit

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: les-cocottes-api:ci
          cache-from: type=gha,scope=les-cocottes-api
          cache-to: type=gha,mode=min,scope=les-cocottes-api

      - name: Build Web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: les-cocottes-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000/api
            API_INTERNAL_URL=http://localhost:4000/api
            NEXT_PUBLIC_AUTH_URL=http://localhost:4000
            DATABASE_URL=postgresql://localco:localco_dev@localhost:5432/localco_build
            BETTER_AUTH_SECRET=localco-ci-better-auth-secret-placeholder
            BETTER_AUTH_URL=http://localhost:4000
          cache-from: type=gha,scope=les-cocottes-web
          cache-to: type=gha,mode=min,scope=les-cocottes-web

      - name: Build Shop image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/shop/Dockerfile
          push: false
          tags: les-cocottes-shop:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000/api
            API_INTERNAL_URL=http://localhost:4000/api
          cache-from: type=gha,scope=les-cocottes-shop
          cache-to: type=gha,mode=min,scope=les-cocottes-shop

  publish-images:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - docker-build
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: les-cocottes-api
            dockerfile: apps/api/Dockerfile
            cache_scope: les-cocottes-api
          - image: les-cocottes-web
            dockerfile: apps/web/Dockerfile
            cache_scope: les-cocottes-web
          - image: les-cocottes-shop
            dockerfile: apps/shop/Dockerfile
            cache_scope: les-cocottes-shop

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://api.lescocottesdediane.fr/api" >> "$GITHUB_OUTPUT"
            echo "auth_url=https://api.lescocottesdediane.fr" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "tag=staging" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://dev.api.lescocottesdediane.fr/api" >> "$GITHUB_OUTPUT"
            echo "auth_url=https://dev.api.lescocottesdediane.fr" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "internal_api_url=http://api:4000/api" >> "$GITHUB_OUTPUT"

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.target.outputs.tag }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.target.outputs.public_api_url }}
            API_INTERNAL_URL=${{ steps.target.outputs.internal_api_url }}
            NEXT_PUBLIC_AUTH_URL=${{ steps.target.outputs.auth_url }}
            DATABASE_URL=postgresql://localco:localco_dev@localhost:5432/localco_build
            BETTER_AUTH_SECRET=localco-ci-better-auth-secret-placeholder
            BETTER_AUTH_URL=${{ steps.target.outputs.auth_url }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

      - name: Record image digest
        shell: bash
        run: |
          echo "${{ steps.image.outputs.name }}:${{ steps.target.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    name: Deploy staging to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://dev.lescocottesdediane.fr

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy staging
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.STAGING_SSH_PORT }}" \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'set -e
             cd /opt/les-cocottes-de-diane/staging
             docker compose -p cocottes-staging -f docker-compose-staging.yml pull
             docker compose -p cocottes-staging -f docker-compose-staging.yml up -d --remove-orphans
             docker image prune -f'