name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  NODE_VERSION: 22
  PNPM_VERSION: 10.33.0
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  deployment-validation:
    name: Deployment scripts and manifest validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Bash syntax
        run: bash -n scripts/deployment/*.sh

      - name: Run ShellCheck
        run: shellcheck -x -P scripts/deployment scripts/deployment/*.sh

      - name: Test release manifest rules
        run: bash scripts/deployment/test-release-scripts.sh

      - name: Validate deployment Docker Compose files
        shell: bash
        run: |
          validation_env="$(mktemp)"
          digest='sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
          export APP_ENV_FILE="$validation_env"
          export API_IMAGE="ghcr.io/example/les-cocottes-api@${digest}"
          export WEB_IMAGE="ghcr.io/example/les-cocottes-web@${digest}"
          export SHOP_IMAGE="ghcr.io/example/les-cocottes-shop@${digest}"

          docker compose \
            --env-file "$validation_env" \
            --file deployment/docker-compose-staging.yml \
            config --quiet
          docker compose \
            --env-file "$validation_env" \
            --file deployment/docker-compose-prod.yml \
            config --quiet

      - name: Reject mutable deployment image references
        shell: bash
        run: |
          if grep -REn \
            '(API_IMAGE|WEB_IMAGE|SHOP_IMAGE)=.*:(latest|staging|prod)([[:space:]]|$)' \
            scripts/deployment; then
            echo 'Deployment scripts must not select mutable image tags' >&2
            exit 1
          fi

          if grep -REn \
            'image:[[:space:]]+.*:(latest|staging|prod)([[:space:]]|$)' \
            deployment; then
            echo 'Deployment Compose files must not select mutable image tags' >&2
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint workspace
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck workspace
        run: pnpm typecheck

  unit-api:
    name: API unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run API unit tests with coverage
        run: pnpm --filter @localco/api test:cov --runInBand

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-coverage
          path: apps/api/coverage/
          if-no-files-found: error
          retention-days: 14

  unit-web:
    name: Web unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Web unit tests
        run: pnpm test:web

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build API
        run: pnpm build:api

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_build
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      API_INTERNAL_URL: http://localhost:4000/api
      NEXT_PUBLIC_AUTH_URL: http://localhost:4000
      BETTER_AUTH_SECRET: localco-ci-better-auth-secret-placeholder
      BETTER_AUTH_URL: http://localhost:4000

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build Web
        run: pnpm build:web

  build-shop:
    name: Build Shop
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4010/api
      API_INTERNAL_URL: http://127.0.0.1:4010/api

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build Shop
        run: pnpm build:shop

  api-e2e:
    name: API PostgreSQL E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: localco
          POSTGRES_PASSWORD: localco_dev
          POSTGRES_DB: localco_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localco -d localco_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_e2e
      BETTER_AUTH_SECRET: localco-ci-better-auth-secret-placeholder
      BETTER_AUTH_URL: http://localhost:4000
      SHOP_PUBLIC_URL: http://localhost:3001
      STRIPE_SECRET_KEY: localco-ci-stripe-placeholder
      STRIPE_WEBHOOK_SECRET: localco-ci-stripe-webhook-placeholder
      CHECKOUT_RATE_LIMIT_MAX: 1000
      ABANDONED_ORDER_DELAY_MINUTES: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Run API E2E tests
        run: pnpm test:api:e2e --runInBand

  shop-e2e:
    name: Shop Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4010/api
      API_INTERNAL_URL: http://127.0.0.1:4010/api

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Disable unavailable Microsoft apt sources
        run: |
          sudo find /etc/apt/sources.list.d -name '*.list' -type f -print0 \
            | sudo xargs -0 --no-run-if-empty sed -i 's|^deb .*packages.microsoft.com|# disabled: &|'

      - name: Install Playwright browsers
        run: pnpm --filter @localco/shop exec playwright install --with-deps chromium

      - name: Build Shop for Playwright
        run: pnpm build:shop

      - name: Run Shop E2E tests
        run: pnpm test:shop:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-playwright-report
          path: apps/shop/playwright-report/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-playwright-results
          path: apps/shop/test-results/
          if-no-files-found: warn
          retention-days: 14

  shop-fullstack-smoke:
    name: Shop full-stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: localco
          POSTGRES_PASSWORD: localco_dev
          POSTGRES_DB: localco_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localco -d localco_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_smoke
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api
      API_INTERNAL_URL: http://127.0.0.1:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Disable unavailable Microsoft apt sources
        run: |
          sudo find /etc/apt/sources.list.d -name '*.list' -type f -print0 \
            | sudo xargs -0 --no-run-if-empty sed -i 's|^deb .*packages.microsoft.com|# disabled: &|'

      - name: Install Playwright browsers
        run: pnpm --filter @localco/shop exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Seed smoke database
        run: pnpm db:seed

      - name: Build API
        run: pnpm build:api

      - name: Build Shop
        run: pnpm build:shop

      - name: Run full-stack smoke test
        run: pnpm test:shop:smoke

      - name: Upload full-stack smoke results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-fullstack-smoke-results
          path: apps/shop/test-results/fullstack-smoke/
          if-no-files-found: warn
          retention-days: 14

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  docker-build:
    name: Docker production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - lint
      - typecheck
      - unit-api
      - unit-web
      - build-api
      - build-web
      - build-shop
      - api-e2e
      - shop-e2e
      - shop-fullstack-smoke
      - dependency-audit
      - deployment-validation

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: les-cocottes-api:ci
          cache-from: type=gha,scope=les-cocottes-api
          cache-to: type=gha,mode=min,scope=les-cocottes-api

      - name: Build Web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: les-cocottes-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000/api
            API_INTERNAL_URL=http://localhost:4000/api
            NEXT_PUBLIC_AUTH_URL=http://localhost:4000
            DATABASE_URL=postgresql://localco:localco_dev@localhost:5432/localco_build
            BETTER_AUTH_SECRET=localco-ci-better-auth-secret-placeholder
            BETTER_AUTH_URL=http://localhost:4000
          cache-from: type=gha,scope=les-cocottes-web
          cache-to: type=gha,mode=min,scope=les-cocottes-web

      - name: Build Shop image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/shop/Dockerfile
          push: false
          tags: les-cocottes-shop:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000/api
            API_INTERNAL_URL=http://localhost:4000/api
          cache-from: type=gha,scope=les-cocottes-shop
          cache-to: type=gha,mode=min,scope=les-cocottes-shop

  publish-images:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - docker-build
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - key: api
            image: les-cocottes-api
            dockerfile: apps/api/Dockerfile
            cache_scope: les-cocottes-api
          - key: web
            image: les-cocottes-web
            dockerfile: apps/web/Dockerfile
            cache_scope: les-cocottes-web
          - key: shop
            image: les-cocottes-shop
            dockerfile: apps/shop/Dockerfile
            cache_scope: les-cocottes-shop

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "public_api_url=/api" >> "$GITHUB_OUTPUT"
          echo "internal_api_url=http://api:4000/api" >> "$GITHUB_OUTPUT"
          echo "auth_url=http://localhost:3000" >> "$GITHUB_OUTPUT"

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.target.outputs.tag }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.target.outputs.public_api_url }}
            API_INTERNAL_URL=${{ steps.target.outputs.internal_api_url }}
            NEXT_PUBLIC_AUTH_URL=${{ steps.target.outputs.auth_url }}
            DATABASE_URL=postgresql://localco:localco_dev@localhost:5432/localco_build
            BETTER_AUTH_SECRET=localco-ci-better-auth-secret-placeholder
            BETTER_AUTH_URL=${{ steps.target.outputs.auth_url }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

      - name: Record image digest
        shell: bash
        run: |
          echo "${{ steps.image.outputs.name }}:${{ steps.target.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

          mkdir -p image-digest
          jq -n \
            --arg key "${{ matrix.key }}" \
            --arg image "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" \
            '{($key): $image}' > "image-digest/${{ matrix.key }}.json"

      - name: Upload image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ matrix.key }}
          path: image-digest/${{ matrix.key }}.json
          if-no-files-found: error
          retention-days: 7

  generate-release:
    name: Generate immutable release manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - publish-images
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: image-digest-*
          path: image-digests
          merge-multiple: true

      - name: Create and validate release manifest
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          api_repository="ghcr.io/${owner}/les-cocottes-api"
          web_repository="ghcr.io/${owner}/les-cocottes-web"
          shop_repository="ghcr.io/${owner}/les-cocottes-shop"

          bash scripts/deployment/create-release-manifest.sh \
            --git-sha "$GITHUB_SHA" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --api-image "$(jq -er '.api' image-digests/api.json)" \
            --web-image "$(jq -er '.web' image-digests/web.json)" \
            --shop-image "$(jq -er '.shop' image-digests/shop.json)" \
            --expected-api-repository "$api_repository" \
            --expected-web-repository "$web_repository" \
            --expected-shop-repository "$shop_repository" \
            --output release.json

          cat release.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-manifest-${{ github.sha }}
          path: release.json
          if-no-files-found: error
          retention-days: 30

  deploy-staging:
    name: Deploy staging to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - generate-release
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    environment:
      name: staging
      url: ${{ vars.ENVIRONMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download release manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-manifest-${{ github.sha }}
          path: release

      - name: Deploy immutable release to staging
        shell: bash
        env:
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE }}
          ENV_FILE: ${{ vars.ENV_FILE }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          DEPLOYMENT_ROOT: ${{ vars.DEPLOYMENT_ROOT }}
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
          WEB_HEALTH_URL: ${{ vars.WEB_HEALTH_URL }}
          SHOP_HEALTH_URL: ${{ vars.SHOP_HEALTH_URL }}
          API_SERVICE: ${{ vars.API_SERVICE }}
          WEB_SERVICE: ${{ vars.WEB_SERVICE }}
          SHOP_SERVICE: ${{ vars.SHOP_SERVICE }}
          MIGRATION_SERVICE: ${{ vars.MIGRATION_SERVICE }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"

          bash scripts/deployment/deploy-over-ssh.sh \
            --environment staging \
            --manifest release/release.json \
            --compose-source deployment/docker-compose-staging.yml \
            --compose-file "$COMPOSE_FILE" \
            --env-file "$ENV_FILE" \
            --project-name "$COMPOSE_PROJECT_NAME" \
            --deployment-root "$DEPLOYMENT_ROOT" \
            --api-health-url "$API_HEALTH_URL" \
            --web-health-url "$WEB_HEALTH_URL" \
            --shop-health-url "$SHOP_HEALTH_URL" \
            --expected-api-repository "ghcr.io/${owner}/les-cocottes-api" \
            --expected-web-repository "ghcr.io/${owner}/les-cocottes-web" \
            --expected-shop-repository "ghcr.io/${owner}/les-cocottes-shop" \
            --api-service "${API_SERVICE:-api}" \
            --web-service "${WEB_SERVICE:-web}" \
            --shop-service "${SHOP_SERVICE:-shop}" \
            --migration-service "${MIGRATION_SERVICE:-migrate}"

  deploy-production:
    name: Deploy production to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - generate-release
      - deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.ENVIRONMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download staging-approved release manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-manifest-${{ github.sha }}
          path: release

      - name: Deploy immutable release to production
        shell: bash
        env:
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE }}
          ENV_FILE: ${{ vars.ENV_FILE }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          DEPLOYMENT_ROOT: ${{ vars.DEPLOYMENT_ROOT }}
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
          WEB_HEALTH_URL: ${{ vars.WEB_HEALTH_URL }}
          SHOP_HEALTH_URL: ${{ vars.SHOP_HEALTH_URL }}
          API_SERVICE: ${{ vars.API_SERVICE }}
          WEB_SERVICE: ${{ vars.WEB_SERVICE }}
          SHOP_SERVICE: ${{ vars.SHOP_SERVICE }}
          MIGRATION_SERVICE: ${{ vars.MIGRATION_SERVICE }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"

          bash scripts/deployment/deploy-over-ssh.sh \
            --environment production \
            --manifest release/release.json \
            --compose-source deployment/docker-compose-prod.yml \
            --compose-file "$COMPOSE_FILE" \
            --env-file "$ENV_FILE" \
            --project-name "$COMPOSE_PROJECT_NAME" \
            --deployment-root "$DEPLOYMENT_ROOT" \
            --api-health-url "$API_HEALTH_URL" \
            --web-health-url "$WEB_HEALTH_URL" \
            --shop-health-url "$SHOP_HEALTH_URL" \
            --expected-api-repository "ghcr.io/${owner}/les-cocottes-api" \
            --expected-web-repository "ghcr.io/${owner}/les-cocottes-web" \
            --expected-shop-repository "ghcr.io/${owner}/les-cocottes-shop" \
            --api-service "${API_SERVICE:-api}" \
            --web-service "${WEB_SERVICE:-web}" \
            --shop-service "${SHOP_SERVICE:-shop}" \
            --migration-service "${MIGRATION_SERVICE:-migrate}"
